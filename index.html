      const WelcomeBannerModal = () => {
        // 1. Quản lý trạng thái
        const [isVisible, setIsVisible] = React.useState(true);
        const [email, setEmail] = React.useState("");
        const [isSubmitted, setIsSubmitted] = React.useState(false);
        const [error, setError] = React.useState("");
        const [isLoading, setIsLoading] = React.useState(false);

        // 2. Xử lý phím Escape để đóng
        React.useEffect(() => {
          if (!isVisible) return;
          const handleKeyDown = (event) => {
            if (event.key === "Escape") {
              setIsVisible(false);
            }
          };
          document.body.style.overflow = "hidden";
          window.addEventListener("keydown", handleKeyDown);
          return () => {
            document.body.style.overflow = "";
            window.removeEventListener("keydown", handleKeyDown);
          };
        }, [isVisible]);

        // 3. Hàm xử lý Logic gọi API SheetDB
        const handleSignUp = async (event) => {
          event.preventDefault();
          if (!email.includes("@") || !email.includes(".")) {
            setError("Vui lòng nhập email hợp lệ.");
            return;
          }

          setIsLoading(true);
          setError("");

          try {
            // BƯỚC 1: GET - Đọc dữ liệu từ Sheets
            // THAY ĐƯỜNG LINK NÀY BẰNG LINK SHEETDB CỦA BẠN
            const SHEETDB_URL = "https://sheetdb.io/api/v1/0mqrcsuyxij77";

            const response = await fetch(SHEETDB_URL);
            const data = await response.json();

            const isDuplicate = data.some((row) => row.Email === email);

            if (isDuplicate) {
              setError("This email has already received a discount code!");
              setIsLoading(false);
            } else {
              // BƯỚC 2: POST - Ghi email mới vào Sheets
              await fetch(SHEETDB_URL, {
                method: "POST",
                headers: {
                  Accept: "application/json",
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  data: [{ Email: email, Date: new Date().toLocaleString() }],
                }),
              });

              setIsSubmitted(true); // Đổi giao diện sang hiện mã
              setIsLoading(false);
            }
          } catch (err) {
            setError("System is busy, please try again later.");
            setIsLoading(false);
          }
        };

        if (!isVisible) return null;

        return (
          <div
            className="fixed inset-0 z-[100] flex items-center justify-center bg-charcoal-ink/60 px-4 py-8"
            role="dialog"
            aria-modal="true"
            aria-labelledby="welcome-banner-title"
            onClick={() => setIsVisible(false)}
          >
            <div
              className="relative grid w-full max-w-[920px] overflow-hidden rounded bg-[#8fb6c8] shadow-[0_32px_80px_-20px_rgba(0,0,0,0.45)] md:grid-cols-12"
              onClick={(event) => event.stopPropagation()}
            >
              {/* Nút Close */}
              <button
                onClick={() => setIsVisible(false)}
                className="absolute right-4 top-4 z-10 flex h-10 w-10 items-center justify-center rounded-full border-2 border-white bg-charcoal-ink/80 text-white shadow-sm transition-opacity hover:opacity-80"
                aria-label="Close welcome banner"
              >
                <span className="material-symbols-outlined text-[22px]">
                  close
                </span>
              </button>

              {/* CỘT TRÁI: Hình ảnh */}
              <div className="hidden min-h-[420px] bg-[#173b5e] md:block md:col-span-7">
                <img
                  alt="Maztermind artisanal masterpieces banner"
                  className="h-full w-full object-cover"
                  src="./images/logo.jpg"
                />
              </div>

              {/* CỘT PHẢI: Logic hiển thị thay đổi theo isSubmitted */}
              <div className="flex min-h-[420px] flex-col justify-center px-6 py-20 text-center sm:px-12 md:px-10 md:col-span-5 relative">
                <p
                  id="welcome-banner-title"
                  className="font-display-lg text-[44px] leading-[48px] text-white sm:text-[56px] sm:leading-[60px]"
                >
                  WELCOME
                  <br />
                  GIFT: 10% OFF
                </p>

                {!isSubmitted ? (
                  /* TRẠNG THÁI 1: FORM NHẬP EMAIL */
                  <form
                    className="mt-12 flex flex-col gap-4"
                    onSubmit={handleSignUp}
                  >
                    <input
                      className={`h-12 w-full bg-white px-4 font-body-md text-body-md text-primary focus:outline-none ${error ? "border-2 border-red-500" : ""}`}
                      placeholder="Email"
                      type="text" // Chuyển thành text để tự xử lý custom error tốt hơn
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                      aria-label="Email"
                    />
                    {error && (
                      <p className="text-red-600 font-bold text-sm bg-white/80 rounded py-1">
                        {error}
                      </p>
                    )}

                    <button
                      className="h-12 w-full bg-black px-4 font-headline-md text-[24px] leading-none text-white transition-opacity hover:opacity-90 disabled:opacity-50"
                      type="submit"
                      disabled={isLoading}
                    >
                      {isLoading ? "PROCESSING..." : "SIGN UP NOW"}
                    </button>
                  </form>
                ) : (
                  /* TRẠNG THÁI 2: HIỂN THỊ MÃ GIẢM GIÁ (Thêm animate-fade-in để mượt mà) */
                  <div className="mt-12 flex flex-col items-center gap-4 animate-fade-in">
                    <p className="text-white font-body-lg text-lg">
                      Email confirmed! Use this code at checkout:
                    </p>
                    <div className="bg-white text-charcoal-ink px-8 py-4 font-bold text-3xl tracking-widest border-4 border-dashed border-charcoal-ink">
                      WELCOME10
                    </div>
                    <button
                      onClick={() => setIsVisible(false)}
                      className="mt-4 underline text-white hover:text-white/80 transition-colors"
                    >
                      Start Shopping
                    </button>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };
      const TopNav = ({ variant = "default", cartCount = 0, onCartOpen }) => {

              </span>
              {cartCount > 0 && (

                  {cartCount}
                </span>
              )}
            </button>
          </nav>
        );
      };

                </button>
              </div>
              <div className="flex-1 overflow-y-auto px-6 py-6">
                {items.length === 0 ? (
                  <div className="flex h-full flex-col items-center justify-center gap-4 text-center">
                    <span className="material-symbols-outlined text-[40px] text-on-surface-variant">

                    <p className="font-body-md text-body-md text-on-surface-variant">

                  </div>
                ) : (
                  <div className="flex flex-col gap-5">
                    {items.map((item) => (
                      <div
                        key={item.id}
                        className="grid grid-cols-[88px_1fr_auto] gap-4 border-b border-outline/10 pb-5"
                      >
                        <img
                          alt={item.name}
                          className="h-[88px] w-[88px] rounded object-cover"

                        />
                        <div>
                          <p className="font-label-sm text-label-sm text-on-surface-variant">

                          <h3 className="mt-1 font-body-md text-body-md text-primary">

                          <p className="mt-2 font-body-md text-body-md text-deep-walnut">

                      COMPLETE THE SET
                    </p>
                    <h2 className="mt-2 font-headline-md text-headline-md text-primary">
                      Add both pieces to your cart
                    </h2>
                  </div>
                </div>
                <div className="grid grid-cols-1 gap-gutter md:grid-cols-2">
                  {relatedProducts.map((product) => (
                    <article
                      key={product.id}
                      className="grid grid-cols-[120px_1fr] gap-5 border border-outline/10 bg-surface-container-low p-4"
                    >
                      <img
                        alt={product.name}
                        className="h-[120px] w-[120px] rounded object-cover"
                        src={product.images ? product.images[0] : product.image}
                      />
                      <div className="flex flex-col justify-between">
                        <div>
                          <p className="font-label-sm text-label-sm text-on-surface-variant">
                            {product.category}
                          </p>
                          <h3 className="mt-1 font-body-lg text-body-lg text-primary">
                            {product.name}
                          </h3>
                          <p className="mt-2 font-body-md text-body-md text-deep-walnut">
                            {formatPrice(product.price)}
                          </p>
                        </div>
                        <button
                          onClick={() => onAddToCart(product)}
                          className="mt-4 flex w-full items-center justify-center gap-2 rounded bg-primary-container px-4 py-3 font-label-sm text-label-sm uppercase text-on-primary transition-opacity hover:opacity-90"
                        >
                          <span className="material-symbols-outlined text-[18px]">
                            add
                          </span>
                          Add Item
                        </button>
                      </div>
                    </article>
                  ))}
                </div>
              </section>
            </main>
            <Footer />
          </div>
        );
      };
      const App = () => {
        const [cartItems, setCartItems] = useState([]);
        const [isCartOpen, setIsCartOpen] = useState(false);

        const addToCart = (product) => {
          setCartItems((currentItems) => {
            if (currentItems.some((item) => item.id === product.id)) {
              return currentItems;
            }
            return [...currentItems, product];
          });
          setIsCartOpen(true);
        };

        const removeFromCart = (productId) => {
          setCartItems((currentItems) =>
            currentItems.filter((item) => item.id !== productId),
          );
        };

        const checkoutOnStripe = () => {
          if (cartItems.length === 0) return;
          const checkoutUrl =
            cartItems.length > 1
              ? COMBO_CHECKOUT_URL
              : cartItems[0].checkoutUrl;
          window.location.href = checkoutUrl;
        };

        return (
          <MemoryRouter>
            <WelcomeBannerModal />
            <CartDrawer
              isOpen={isCartOpen}
              items={cartItems}
              onClose={() => setIsCartOpen(false)}
              onRemove={removeFromCart}
              onCheckout={checkoutOnStripe}
            />
            <Routes>
              <Route
                path="/"
                element={
                  <HomePage
                    cartCount={cartItems.length}
                    onCartOpen={() => setIsCartOpen(true)}
                  />
                }
              />
              <Route
                path="/product"
                element={
                  <ProductPage
                    cartCount={cartItems.length}
                    onCartOpen={() => setIsCartOpen(true)}
                    onAddToCart={addToCart}
                  />
                }
              />
              <Route
                path="/our-story"
                element={
                  <OurStoryPage
                    cartCount={cartItems.length}
                    onCartOpen={() => setIsCartOpen(true)}
                  />
                }
              />
              <Route
                path="/product/:productId"
                element={
                  <ProductPage
                    cartCount={cartItems.length}
                    onCartOpen={() => setIsCartOpen(true)}
                    onAddToCart={addToCart}
                  />
                }
              />
            </Routes>
          </MemoryRouter>
        );
      };

      const root = createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
